services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: puls
      POSTGRES_USER: puls
      POSTGRES_PASSWORD: puls_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U puls -d puls']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://puls:puls_secret@postgres:5432/puls
      SESSION_SECRET: change_me_in_production_use_a_long_random_string_at_least_64_chars
      RPID: localhost
      ORIGIN: http://localhost
      PORT: '3001'
      NODE_ENV: production
      COOKIE_SECURE: 'false'
      CORS_ORIGIN: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '80:80'
    environment:
      BACKEND_URL: http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
