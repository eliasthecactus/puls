services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: puls
      POSTGRES_USER: puls
      POSTGRES_PASSWORD: puls_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U puls -d puls']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
